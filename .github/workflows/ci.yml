name: CI

on:
  push:
    branches: [ main, features-login ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: promptmarket
          POSTGRES_DB: promptmarket
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U promptmarket -d promptmarket" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations and tests
        env:
          DJANGO_SETTINGS_MODULE: Promt.settings.development
          DATABASE_URL: postgres://promptmarket:password@localhost:5432/promptmarket
        run: |
          python manage.py migrate --noinput
          python manage.py test --verbosity=2
