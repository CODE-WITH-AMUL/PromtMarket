{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PromptMarket{% endblock %}</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Core Styles -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --gray-100: #f2f2f2;
      --gray-200: #e0e0e0;
      --gray-400: #aaaaaa;
      --gray-600: #666666;
      --serif: 'DM Serif Display', serif;
      --sans: 'Instrument Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: .5;
    }

    .container { max-width: 1160px; margin: 0 auto; padding: 0 2rem; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--black);
    }

    .header-inner {
      display: flex; align-items: stretch; justify-content: space-between;
      height: 56px;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--serif); font-size: 1.25rem;
      border-right: 1px solid var(--black); padding: 0 1.5rem;
      text-decoration: none; color: var(--black);
      letter-spacing: -0.01em;
    }

    .logo-mark {
      width: 28px; height: 28px; background: var(--black);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: .75rem; color: var(--white);
      font-weight: 500; letter-spacing: 0;
    }

    nav { display: flex; align-items: stretch; }
    nav a {
      display: flex; align-items: center;
      padding: 0 1.25rem;
      font-size: .8rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase;
      color: var(--gray-600); text-decoration: none;
      border-left: 1px solid var(--gray-200);
      transition: background .15s, color .15s;
    }
    nav a:hover { background: var(--gray-100); color: var(--black); }
    .nav-cta {
      background: var(--black) !important; color: var(--white) !important;
      border-left: 1px solid var(--black) !important;
      font-weight: 600 !important;
      transition: opacity .15s !important;
    }
    .nav-cta:hover { opacity: .85 !important; background: var(--black) !important; }

    footer {
      border-top: 1px solid var(--black);
    }

    .footer-shell {
      display: flex; align-items: stretch; justify-content: space-between; width: 100%;
    }

    .footer-brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--serif); font-size: 1rem;
      padding: 1.25rem 1.5rem; border-right: 1px solid var(--gray-200);
    }

    .footer-right { display: flex; align-items: stretch; }
    .footer-links { display: flex; align-items: stretch; }
    .footer-links a {
      display: flex; align-items: center;
      padding: 0 1.25rem; font-size: .78rem; font-weight: 500;
      letter-spacing: .05em; text-transform: uppercase;
      color: var(--gray-600); text-decoration: none;
      border-left: 1px solid var(--gray-200);
      transition: background .15s, color .15s;
    }
    .footer-links a:hover { background: var(--gray-100); color: var(--black); }
    .footer-copy {
      display: flex; align-items: center;
      padding: 0 1.5rem; border-left: 1px solid var(--gray-200);
      font-family: var(--mono); font-size: .72rem; color: var(--gray-400);
      letter-spacing: .04em;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; font-family: var(--sans);
      font-size: .875rem; font-weight: 600; letter-spacing: .02em;
      text-decoration: none; cursor: pointer; border: none;
      transition: all .2s;
    }
    .btn-black { background: var(--black); color: var(--white); }
    .btn-black:hover { background: #333; }
    .btn-outline { background: transparent; color: var(--black); border: 1px solid var(--black); }
    .btn-outline:hover { background: var(--black); color: var(--white); }

    @media (max-width: 900px) {
      nav a { display: none; }
      nav a:last-child { display: flex; }

      .hero { grid-template-columns: 1fr !important; }
      .hero-left { border-right: none !important; border-bottom: 1px solid var(--black) !important; }

      .steps { grid-template-columns: 1fr !important; }
      .features-grid { grid-template-columns: 1fr !important; }
      .footer-shell { flex-direction: column; }
      .footer-right { flex-direction: column; }
    }
  </style>

  <!-- Extra CSS for specific pages -->
  {% block extra_css %}{% endblock %}
</head>

<body>
  <!-- Header / Navigation -->
  {% include 'components/navbar.html' %}
  
  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>
  
  <!-- Footer -->
  {% include 'components/footer.html' %}
  
  <!-- JavaScript -->
  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
